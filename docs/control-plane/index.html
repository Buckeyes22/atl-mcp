<head>

<body>
<div id="root"></div>

<script src="mcp-client.js?v=3"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script src="control-surface-model.js?v=1"></script>
<script type="text/babel" src="components.jsx?v=4"></script>
<script type="text/babel" src="data-limited.jsx"></script>
<script type="text/babel" src="use-admin.jsx"></script>
<script type="text/babel" src="app-tweaks.jsx"></script>
<script type="text/babel" src="page-dashboard.jsx?v=5"></script>
<script type="text/babel" src="page-projects.jsx?v=8"></script>
<script type="text/babel" src="page-jobs-policy.jsx?v=2"></script>
<script type="text/babel" src="page-audit.jsx"></script>
<script type="text/babel" src="page-tier23.jsx?v=2"></script>
<script type="text/babel" src="page-index.jsx"></script>
<script type="text/babel" src="page-role-workflows.jsx?v=1"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function NotFoundPage() {
  return (
    <div className="cp-page">
      <PageHead eyebrow="404" title="Route not found" />
      <p style={{color: 'var(--ink-3)'}}>That hash route is not wired up.</p>
      <a className="btn" href="#/index" style={{marginTop: 12}}>Back to screen index →</a>
    </div>
  );
}

function App() {
  const hash = useHashRoute();
  const path = hash.replace(/^#\/?/, '');
  const parts = path.split('/').filter(Boolean);
  const route = parts[0] || 'dashboard';

  let active = 'dashboard';
  let page = null;

  if (path === '' || route === 'dashboard') {
    active = 'dashboard'; page = <DashboardPage />;
  } else if (route === 'projects' && parts.length > 1) {
    active = 'projects'; page = <ProjectDetailPage projectKey={parts[1]} />;
  } else if (route === 'projects') {
    active = 'projects'; page = <ProjectListPage />;
  } else if (route === 'jobs') {
    active = 'jobs'; page = <JobsPage />;
  } else if (route === 'audit') {
    active = 'audit'; page = <AuditPage />;
  } else if (route === 'policy') {
    active = 'policy'; page = <PolicyPage />;
  } else if (route === 'providers') {
    active = 'providers'; page = <ProvidersPage />;
  } else if (route === 'sessions') {
    active = 'sessions'; page = <SessionsPage />;
  } else if (route === 'requirements-assist') {
    active = 'requirements-assist'; page = <RequirementsAssistPage />;
  } else if (route === 'agent-assignment') {
    active = 'agent-assignment'; page = <AgentAssignmentPage />;
  } else if (route === 'alerts') {
    active = 'alerts'; page = <AlertsPage />;
  } else if (route === 'migrations') {
    active = 'migrations'; page = <MigrationsPage />;
  } else if (route === 'secrets') {
    active = 'secrets'; page = <SecretsPage />;
  } else if (route === 'slo') {
    active = 'slo'; page = <SloPage />;
  } else if (route === 'capacity') {
    active = 'capacity'; page = <CapacityPage />;
  } else if (route === 'dr') {
    active = 'dr'; page = <DrPage />;
  } else if (route === 'settings') {
    active = 'settings'; page = <SettingsPage />;
  } else if (route === 'index') {
    active = 'index'; page = <IndexPage />;
  } else {
    page = <NotFoundPage />;
  }

  return (
    <CPTweaksProvider>
      <TopNav activeRoute={active} />
      {page}
    </CPTweaksProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
